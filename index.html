<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNITE: SYSTEM DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- 引入你的核心样式 -->
    <link rel="stylesheet" href="./css/ignite-core.css">
    
    <style>
        /* --- 首页导航栏收起动画 --- */
        .sidebar { transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .sidebar.collapsed { transform: translateX(-120%); opacity: 0; width: 0 !important; margin: 0 !important; padding: 0 !important; pointer-events: none; }
        .main-view { transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); }

        /* --- 主页专属滚动条 (完美解决第6章溢出) --- */
        .sub-grid {
            flex: 1; overflow-y: auto; min-height: 0; padding-right: 15px; margin-bottom: 20px; 
            display: grid; gap: 15px; align-content: start;
        }
        .sub-grid::-webkit-scrollbar { width: 6px; }
        .sub-grid::-webkit-scrollbar-track { background: rgba(0, 243, 255, 0.05); border-radius: 4px; }
        .sub-grid::-webkit-scrollbar-thumb { background: rgba(0, 243, 255, 0.3); border-radius: 4px; border: 1px solid rgba(0, 243, 255, 0.1); transition: all 0.3s ease; }
        .sub-grid::-webkit-scrollbar-thumb:hover { background: rgba(0, 243, 255, 0.8); box-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }
    </style>
</head>
<body>

    <div class="fx-layer fx-grid"></div>

    <!-- 自动引入公共头部 -->
    {% include header.html %}

    <div class="interface">
        
        <div class="sidebar">
            <div class="sb-header">
                <div class="sb-label">COURSE INDEX // SELECTION</div>
                <div class="sb-title">MODULE MAP</div>
            </div>
            <div class="nav-list" id="navList"></div>
        </div>

        <div class="main-view">
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>

            <div class="view-body">
                <div class="vh-group">
                    <div>
                        <div class="vh-main" id="viewEn">LOADING...</div>
                        <div class="vh-sub" id="viewCn">系统加载中...</div>
                    </div>
                    <div class="author-tag">INSTRUCTOR: <b>HUANDONG CAO</b></div>
                </div>

                <div class="pang-row">
                    <div class="wave"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <div class="pang-msg" id="pangMsg">>> PANG: System Initialized.</div>
                </div>

                <div class="sub-grid" id="subGrid"></div>

                <div class="view-footer">
                    <div style="display:flex; gap:20px; margin-right:auto;">
                        <button class="tech-btn" onclick="alert('EXAM MODE LOCKED')"><span>EXAM MODE</span></button>
                        <button class="tech-btn" onclick="alert('NOTES SYNCED')"><span>LECTURE NOTES</span></button>
                    </div>
                    <button class="enter-btn" id="enterBtn" onclick="launch()">ENTER LAB <span class="enter-arrow">➜</span></button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- 系统全局数据中心 ---
        const curriculum = [
            {
                id: 1, en: "LIMITS & FOUNDATIONS", cn: "第1章：极限与基础", url: "#", msg: "Analyzing asymptotic behavior. IVT protocols ready.",
                subs: [
                    {c:"1.1", e:"Intuition & Estimation", z:"极限的直观理解与数值估算", u:"1-1.html"},
                    {c:"1.2", e:"Analytic Calculation", z:"极限的解析计算", u:"1-2.html"},
                    {c:"1.3", e:"One-Sided Limits", z:"单侧极限", u:"1-3.html"},
                    {c:"1.4", e:"Infinity & Asymptotes", z:"无穷远处极限与水平渐近线", u:"1-4.html"},
                    {c:"1.5", e:"Continuity", z:"连续性", u:"1-5.html"},
                    {c:"1.6", e:"IVT Theorem", z:"中介值定理", u:"1-6.html"}
                ]
            },
            {
                id: 2, en: "THE DERIVATIVE", cn: "第2章：导数", url: "#", msg: "Calculating Rates of Change. Visualizing Slope.",
                subs: [
                    {c:"2.1", e:"Derivatives", z:"导数的定义", u:"2-1.html"},
                    {c:"2.2", e:"Derivative Rules & Calculations", z:"导数基本法则与计算", u:"2-2.html"},
                    {c:"2.3", e:"Derivative Proofs", z:"导数证明", u:"2-3.html"},
                    {c:"2.4", e:"Chain Rule", z:"链式法则", u:"2-4.html"}
                ]
            },
            {
                id: 3, en: "DIFF TECHNIQUES", cn: "第3章：微分技巧", url: "#", msg: "Advanced protocols: Chain Rule and Implicit Differentiation.",
                subs: [
                    {c:"3.1", e:"Product & Quotient", z:"积法则与商法则", u:"3-1.html"},
                    {c:"3.2", e:"Chain Rule", z:"链式法则与复合函数求导", u:"3-2.html"},
                    {c:"3.3", e:"Implicit Diff", z:"隐函数微分法", u:"3-3.html"},
                    {c:"3.4", e:"Inverse Functions", z:"反函数微分法", u:"3-4.html"},
                    {c:"3.5", e:"Exp & Log Functions", z:"指数与对数函数微分法", u:"3-5.html"}
                ]
            },
            {
                id: 4, en: "APPLICATIONS OF DIFF", cn: "第4章：导数的应用", url: "#", msg: "Optimization engines online. L'Hopital's Rule standby.",
                subs: [
                    {c:"4.1", e:"Related Rates", z:"相关变化率", u:"4-1.html"},
                    {c:"4.2", e:"Extreme Values", z:"函数的极值", u:"4-2.html"},
                    {c:"4.3", e:"MVT Theorem", z:"中值定理与函数性状", u:"4-3.html"},
                    {c:"4.4", e:"First Derivative Test", z:"一阶导数测试与函数单调性", u:"4-4.html"},
                    {c:"4.5", e:"Second Derivative Test", z:"二阶导数测试与函数凹凸性", u:"4-5.html"},
                    {c:"4.6", e:"Optimization", z:"最优化问题", u:"4-6.html"},
                    {c:"4.7", e:"L'Hopital's Rule", z:"洛必达法则与不定式极限", u:"4-7.html"}
                ]
            },
            {
                id: 5, en: "INTEGRATION", cn: "第5章：积分", url: "#", msg: "Accumulating Area. Fundamental Theorem loaded.",
                subs: [
                    {c:"5.1", e:"Riemann Sums", z:"定积分与黎曼和", u:"5-1.html"},
                    {c:"5.2", e:"FTC Theorem", z:"微积分基本定理", u:"5-2.html"},
                    {c:"5.3", e:"Antiderivatives", z:"不定积分与反导数", u:"5-3.html"},
                    {c:"5.4", e:"Substitution", z:"换元积分法", u:"5-4.html"}
                ]
            },
            {
                id: 6, en: "INTEGRATION & APPLICATIONS", cn: "第6章：积分与应用", url: "#", msg: "Processing Indefinite & Definite Integrals. Advanced BC protocols loaded.",
                subs: [
                    {c:"6.1", e:"Anti-derivative & Indefinite Integrals", z:"反导数与不定积分", u:"6-1.html"},
                    {c:"6.2", e:"Properties of Indef. Int's", z:"不定积分的性质", u:"6-2.html"},
                    {c:"6.3", e:"Formulas and Calculating", z:"不定积分公式与计算", u:"6-3.html"},
                    {c:"6.4", e:"u-substitution", z:"u-换元法", u:"6-4.html"},
                    {c:"6.5", e:"Long Division & Completing Sq.", z:"长除法与配方法", u:"6-5.html"},
                    {c:"6.6", e:"Linear Partial Fractions [BC]", z:"线性部分分式 [BC]", u:"6-6.html"},
                    {c:"6.7", e:"Integration by Parts [BC]", z:"分部积分法 [BC]", u:"6-7.html"},
                    {c:"Q1",  e:"Quiz 1", z:"阶段测验 1", u:"6-q1.html"},
                    {c:"6.8", e:"Riemann Sums", z:"黎曼和", u:"6-8.html"},
                    {c:"6.9", e:"FTC & Definite Integrals", z:"微积分基本定理与定积分", u:"6-9.html"},
                    {c:"6.10", e:"Evaluating & Applying Definite", z:"定积分的计算与应用", u:"6-10.html"},
                    {c:"6.11", e:"Applications - Areas", z:"积分应用：面积", u:"6-11.html"},
                    {c:"6.12", e:"Applications - Volumes", z:"积分应用：体积", u:"6-12.html"},
                    {c:"6.13", e:"Average Value, Interpretations", z:"平均值与解释", u:"6-13.html"},
                    {c:"6.14", e:"Arc Length [BC]", z:"弧长 [BC]", u:"6-14.html"},
                    {c:"6.15", e:"Mechanics Using Integrals", z:"运动学积分应用", u:"6-15.html"},
                    {c:"Q2",  e:"Quiz 2", z:"阶段测验 2", u:"6-q2.html"}
                ]
            },
            {
                id: 7, en: "DIFFERENTIAL EQS", cn: "第7章：微分方程", url: "#", msg: "Slope Fields visualizer. Modeling active.", locked: true,
                subs: [
                    {c:"7.1", e:"Slope Fields", z:"微分方程建模与斜率场", u:"#"},
                    {c:"7.2", e:"Separable Eqs", z:"可分离变量微分方程", u:"#"},
                    {c:"7.3", e:"Logistic Models", z:"指数模型与逻辑斯蒂模型", u:"#"}
                ]
            },
            {
                id: 8, en: "FINAL REVIEW", cn: "第8章：总复习", url: "#", msg: "EXAM PROTOCOLS ENGAGED. Restricted Area.", locked: true,
                subs: [
                    {c:"8.1", e:"Key Concepts Review", z:"核心概念串讲", u:"#"},
                    {c:"8.2", e:"MCQ Strategies", z:"多项选择题策略", u:"#"},
                    {c:"8.3", e:"FRQ Strategies", z:"自由问答题策略", u:"#"},
                    {c:"8.4", e:"Practice Exam", z:"全真模拟考试与讲评", u:"#"}
                ]
            }
        ];

        let targetURL = ""; 

        (function initSystem() {
            const navList = document.getElementById('navList');
            curriculum.forEach((item, index) => {
                const btn = document.createElement('div');
                btn.className = `nav-btn ${item.locked ? 'locked' : ''}`;
                btn.id = `nav-${index}`;
                btn.onclick = () => loadUnit(index);
                btn.innerHTML = `<div class="nb-id">UNIT 0${item.id}</div><div class="nb-title">${item.en}</div><div class="nb-cn">${item.cn}</div>`;
                navList.appendChild(btn);
            });
            loadUnit(5); // 默认高亮第六章 (索引为5)
        })();

        function loadUnit(index) {
            const data = curriculum[index];
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${index}`).classList.add('active');

            document.getElementById('viewEn').innerText = data.en;
            document.getElementById('viewCn').innerText = data.cn;
            
            const pMsg = document.getElementById('pangMsg');
            pMsg.innerText = `>> PANG: ${data.msg}`;
            pMsg.style.opacity = '0.5';
            setTimeout(() => pMsg.style.opacity = '1', 100);

            if(data.subs.length > 0) targetURL = data.subs[0].u;
            else targetURL = "#";
            
            document.getElementById('enterBtn').disabled = (targetURL === '#');

            const subGrid = document.getElementById('subGrid');
            subGrid.innerHTML = '';
            
            data.subs.forEach((sub, subIndex) => {
                const card = document.createElement('div');
                card.className = 'sub-card';
                // 针对测验加上特殊样式
                if(sub.c.includes('Q')) {
                    card.style.borderLeft = "2px solid #ffaa00";
                    card.innerHTML = `<div class="sc-id" style="color:#ffaa00;">${sub.e}</div><div class="sc-title" style="color:#fff;">${sub.z}</div><div class="sc-cn">SEC ${sub.c}</div>`;
                } else {
                    card.innerHTML = `<div class="sc-id">SEC ${sub.c}</div><div class="sc-title">${sub.e}</div><div class="sc-cn">${sub.z}</div>`;
                }
                
                card.onclick = function() { selectSub(this, sub.u); };
                if (subIndex === 0) card.classList.add('selected');
                subGrid.appendChild(card);
            });
        }

        function selectSub(el, url) {
            document.querySelectorAll('.sub-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            targetURL = url; 
            document.getElementById('enterBtn').disabled = (targetURL === '#');
        }

        // --- 无缝衔接收起动画 (没有大括号丢失问题了！) ---
        function launch() {
            if(!targetURL || targetURL === '#') {
                alert(">> PANG: Please select a section first.");
                return;
            }
            
            const btn = document.getElementById('enterBtn');
            btn.innerHTML = "ENGAGING...";
            btn.disabled = true; 
            
            const sidebar = document.querySelector('.sidebar');
            if (sidebar) sidebar.classList.add('collapsed');

            const mainView = document.querySelector('.main-view');
            if (mainView) mainView.style.boxShadow = "0 0 50px rgba(0, 243, 255, 0.5) inset";
            
            // 无延迟瞬间跳转
            window.location.href = targetURL;
        }
    </script>
</body>
</html>
