<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNITE: {{ page.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/ignite-core.css">
    
    <style>
        /* =========================================
           沉浸式全屏布局定制 (覆盖 ignite-core)
           ========================================= */
        .main-view {
            flex-direction: row !important; /* 横向排布：主屏幕 + 右侧工具栏 */
            width: 100% !important; max-width: 100% !important; height: 100% !important;
            margin: 0 !important; border: none !important; box-shadow: none !important; background: #000 !important;
        }

        /* 释放内容区：绝对全屏撑满 */
        .immersive-area {
            flex: 1; height: 100%; position: relative; overflow: hidden;
            background: #000;
        }

        /* 全新的右侧垂直侧壁栏 */
        .right-toolbar {
            width: 80px; height: 100%;
            background: rgba(5, 10, 15, 0.95);
            border-left: 1px solid rgba(0, 243, 255, 0.2);
            display: flex; flex-direction: column; align-items: center;
            padding-top: 20px; z-index: 80;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }

        /* 垂直排列的机甲按钮 */
        .mode-btn {
            width: 60px; height: 60px; margin-bottom: 15px;
            background: rgba(0, 30, 60, 0.3); border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #678; font-family: 'Share Tech Mono', monospace; font-size: 9px; font-weight: 700; 
            cursor: pointer; transition: all 0.3s ease; gap: 6px; letter-spacing: 1px;
        }
        .mode-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .mode-btn:hover, .mode-btn.active {
            color: #00f3ff; border-color: #00f3ff; background: rgba(0, 243, 255, 0.1); box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        
        .mode-btn.lab-btn { margin-top: auto; margin-bottom: 20px; color: #ffaa00; border-color: rgba(255,85,0,0.4); background: rgba(255,85,0,0.05); }
        .mode-btn.lab-btn:hover, .mode-btn.lab-btn.active { color: #fff; border-color: #ffaa00; background: rgba(255,85,0,0.2); box-shadow: 0 0 20px rgba(255,85,0,0.4); }

        .stark-panel { display: none; width: 100%; height: 100%; }
        .stark-panel.active { display: block; }
        .iframe-container { width: 100%; height: 100%; border: none; display: block; background: #000; }
        
        /* 微调左侧唤醒按钮防止遮挡 */
        .sidebar-toggle-btn { top: 20px !important; }
    </style>
</head>
<body>

    <div class="fx-layer fx-grid"></div>

    <!-- 注入头部和侧边栏 -->
    {% include header.html %}

    <div class="interface">
        {% include sidebar.html %}

        <div class="main-view">
            
            <!-- 左侧：100% 无死角沉浸式屏幕 -->
            <div class="immersive-area">
                
              <div style="flex:1; position:relative; width: 100%; height: 100%; overflow: hidden;">
                    
                   <!-- LECTURE -->
                <div id="view-lecture" class="stark-panel active">
                    <iframe src="./{{ page.lecture_src }}" class="iframe-container"></iframe>
                </div>

                <!-- NOTES -->
                <div id="view-notes" class="stark-panel">
                    <iframe src="./{{ page.notes_src }}" class="iframe-container"></iframe>
                </div>

                <!-- ASSIGNMENT -->
                <div id="view-assign" class="stark-panel">
                    <iframe src="./{{ page.assign_src }}" class="iframe-container"></iframe>
                </div>

                <!-- LAB -->
                <div id="view-lab" class="stark-panel">
                    <iframe src="./derivative.html" class="iframe-container"></iframe>
                </div>

                <!-- QUIZ -->
                <div id="view-quiz" class="stark-panel">
                    <iframe src="./{{ page.quiz_src }}" class="iframe-container"></iframe>
                </div>

            <!-- 右侧：悬浮侧壁工具栏 -->
            <div class="right-toolbar">
                <button class="mode-btn active" onclick="switchView('lecture', this)">
                    <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM8 8v8l7-4z"/></svg>
                    LECTURE
                </button>
                <button class="mode-btn" onclick="switchView('notes', this)">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    NOTES
                </button>
                <button class="mode-btn" onclick="switchView('assign', this)">
                    <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    ASSIGN
                </button>
                <button class="mode-btn" onclick="switchView('quiz', this)">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                    QUIZ
                </button>
                
                <!-- LAB 按钮被推到了侧边栏的最下面 -->
                <button class="mode-btn lab-btn" onclick="switchView('lab', this)">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2l-5.5 9h11L12 2zm0 3.8l2.6 4.2h-5.2L12 5.8zM7.5 13l-3 7h15l-3-7h-9zm1.8 2h5.4l1.3 3H8l1.3-3z"/>
                    </svg>
                    LAB
                </button>
            </div>

        </div>

    </div>

    <!-- 引入侧边栏交互 JS -->
    <script src="{{ '/js/ignite-ui.js' | relative_url }}"></script>
</body>
</html>
